# nginx.conf — конфигурация для React SPA
# Решает две задачи:
#   1. Client-side routing: все пути отдаём index.html (React Router обработает)
#   2. Обратный прокси для /eList/* → бэкенд (избегаем CORS в production)

server {
    listen       80;
    server_name  _;

    # Корень со статикой из Vite build
    root /usr/share/nginx/html;
    index index.html;

    # Gzip-сжатие
    gzip on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Долгое кеширование хешированных ассетов (Vite добавляет hash в имена файлов)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Обратный прокси для API — перенаправляем /eList/* на бэкенд
    # Значение BACKEND_URL подставляется через envsubst при старте контейнера
    location /eList/ {
        proxy_pass         ${BACKEND_URL}/eList/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback: всё остальное → index.html
    location / {
        try_files $uri $uri/ /index.html;

        # Не кешируем index.html — браузер должен всегда проверять версию
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }
}
